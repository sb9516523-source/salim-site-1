<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="verify-page-title">Employee Verification Portal</title>
    <meta name="description" content="Official Employee Verification Portal of Valley Security Service Agency. Verify security guard credentials and active status instantly via QR code.">
    <meta name="keywords" content="Valley Security, Valley Security Service Agency, Security Guard, Verification Portal, QR Code Verify, Active Guards">
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://valleysecurityserviceagency.in/verification.html">
    <meta property="og:title" content="Employee Verification Portal">
    <meta property="og:description" content="Official Employee Verification Portal of Valley Security Service Agency. Verify security guard credentials and active status instantly via QR code.">
    <meta property="og:image" content="https://valleysecurityserviceagency.in/favicon.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://valleysecurityserviceagency.in/verification.html">
    <meta property="twitter:title" content="Employee Verification Portal">
    <meta property="twitter:description" content="Official Employee Verification Portal of Valley Security Service Agency. Verify security guard credentials and active status instantly via QR code.">
    <meta property="twitter:image" content="https://valleysecurityserviceagency.in/favicon.png">

    <!-- ⚙️ FIRM CONFIG — load FIRST -->
    <script src="firm-config.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QRious QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root {
            --primary-bg: #f4f6f5;
            --secondary-bg: #ffffff;
            --theme-gold: #0e3e2b;
            --theme-sage: #52b788;
            --text-primary: #1c2621;
            --text-secondary: #5a6560;
            --text-muted: #8e9a94;
            --status-active: #2e7d32;
            --status-suspended: #d32f2f;
            --status-pending: #ed6c02;
            
            --glass-border: #e1e7e4;
            --glass-background: #ffffff;
            --glass-blur: none;
            --card-shadow: 0 4px 20px rgba(14, 62, 43, 0.03), 0 1px 2px rgba(14, 62, 43, 0.01);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient luxury background glow */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(82, 183, 136, 0.12) 0%, transparent 70%);
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            pointer-events: none;
        }

        .verify-container {
            width: 100%;
            max-width: 440px;
            background: var(--glass-background);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            padding: 30px;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .agency-brand {
            margin-bottom: 24px;
        }

        .brand-logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(14, 62, 43, 0.08);
            border: 1px solid var(--theme-gold);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            color: var(--theme-gold);
        }

        .brand-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 1.5px;
            line-height: 1.2;
            color: var(--theme-gold);
        }

        .brand-subtitle {
            font-size: 10px;
            letter-spacing: 1.5px;
            color: var(--theme-sage);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Status Banner Badge */
        .status-badge-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .verification-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-verified {
            background: #e2f0d9;
            color: var(--status-active);
            border: 1px solid #c5e1a5;
        }

        .status-suspended {
            background: #fce4d6;
            color: var(--status-suspended);
            border: 1px solid #f8cbad;
        }

        .status-notfound {
            background: #f0f3f1;
            color: var(--text-secondary);
            border: 1px solid #e1e7e4;
        }

        @keyframes badgeEntry {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Guard Profile Card info */
        .guard-avatar-frame {
            width: 130px;
            height: 155px;
            margin: 0 auto 20px auto;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            padding: 4px;
            background: var(--dark-accent);
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .status-verified ~ .guard-avatar-frame {
            border-color: var(--status-active);
        }

        .guard-avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .guard-name {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .guard-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--theme-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
        }

        .info-grid {
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-align: left;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .info-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .info-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .footer-note {
            font-size: 10px;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
            margin-top: 20px;
        }

        .footer-note strong {
            color: var(--theme-gold);
        }

        /* Error States styling */
        .error-message {
            padding: 40px 0;
        }

        .error-icon {
            color: var(--status-suspended);
            margin-bottom: 16px;
        }

        .error-message h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        /* Disable all transitions and animations */
        *, *::before, *::after {
            transition: none !important;
            animation: none !important;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <!-- Brand -->
        <div class="agency-brand">
            <div class="brand-logo">
                <i data-lucide="shield-check" style="width: 32px; height: 32px;"></i>
            </div>
            <h2 class="brand-title" id="verify-firm-title">VALLEY SECURITY</h2>
            <span class="brand-subtitle">Verification Service</span>
        </div>

        <div id="portal-content">
            <!-- Dynamic Content goes here -->
            <div class="placeholder-message" style="padding: 40px 0; text-align: center;">
                <p class="text-muted">Loading employee credentials from central node database...</p>
            </div>
        </div>

        <div class="footer-note">
            Licence No: <strong id="verify-license-no">PSA | L | 99 | JK |2024 | DEC | 3| 62</strong><br>
            <p id="verify-footer-address">Valley Security Service Agency Head Office: SHAHEED GUNJ NATH COMPLEX SRINAGAR 190001</p>
        </div>
    </div>

    <script>
        // Apply FIRM_CONFIG on verification page
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof FIRM_CONFIG !== 'undefined') {
                const C = FIRM_CONFIG;
                const t = document.getElementById('verify-page-title');
                if (t) t.innerText = 'Employee Verification - ' + C.name;
                const title = document.getElementById('verify-firm-title');
                if (title) title.innerText = C.nameShort;
                const licNo = document.getElementById('verify-license-no');
                if (licNo) licNo.innerText = C.licenseNo;
                const addr = document.getElementById('verify-footer-address');
                if (addr) addr.innerText = C.name + ' Head Office: ' + C.address;
            }
            verifyEmployee();
        });

        async function verifyEmployee() {
            const contentDiv = document.getElementById('portal-content');
            
            // Extract employee ID from URL queries
            const urlParams = new URLSearchParams(window.location.search);
            const empId = urlParams.get('id');
            const token = urlParams.get('token') || '';

            if (!empId) {
                renderError(contentDiv, "Invalid Verification Query", "No employee identification parameter was provided. Please check the scan URL details.");
                return;
            }

            try {
                // Fetch details for this specific guard from the public lookup API
                const response = await fetch('/api/employees/' + encodeURIComponent(empId) + '?token=' + encodeURIComponent(token));
                if (response.status === 401) {
                    renderError(contentDiv, "Unauthorized Access", "The verification link signature is invalid. Scanning the official QR code on the physical ID card is required to view these credentials.");
                    return;
                }
                if (response.status === 404) {
                    renderError(contentDiv, "Guardsman Profile Record Missing", `No registered personnel fits the identity key <strong>${escapeHtml(empId)}</strong> in our active database.`);
                    return;
                }
                if (!response.ok) throw new Error("Verification network node unreachable.");
                
                const guard = await response.json();

                // Render success status card details
                renderGuardDetails(contentDiv, guard);
                lucide.createIcons();
            } catch (err) {
                // local fallback if server unreachable
                console.error(err);
                renderError(contentDiv, "Network Connection Node Failure", "Unable to establish contact with the Valley Security Agency Local Cloud. Verify server status.");
            }
        }

        function getFallbackAvatar(initial) {
            const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='100' height='120' viewBox='0 0 100 120'><defs><linearGradient id='avatarGrad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%23c8102e'/><stop offset='100%' stop-color='%230f1218'/></linearGradient></defs><rect width='100%' height='100%' fill='url(%23avatarGrad)'/><text x='50%' y='55%' font-family='sans-serif' font-weight='bold' font-size='32' fill='%23ffffff' text-anchor='middle'>${initial}</text></svg>`;
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
        }

        function renderGuardDetails(container, guard) {
            const isActive = guard.status === 'Active';
            const statusClass = isActive ? 'status-verified' : 'status-suspended';
            const statusText = isActive ? 'Active Guard (Verified)' : `${guard.status} Personnel`;
            const statusIcon = isActive ? 'check-circle-2' : 'alert-octagon';

            const photoUrl = guard.documents?.photo || getFallbackAvatar(guard.name ? guard.name[0].toUpperCase() : '?');

            container.innerHTML = `
                <div class="status-badge-container">
                    <span class="verification-status ${statusClass}">
                        <i data-lucide="${statusIcon}" style="width: 16px; height: 16px;"></i>
                        ${statusText}
                    </span>
                </div>

                <div class="guard-avatar-frame">
                    <img src="${photoUrl}" alt="Guard Profile">
                </div>

                <h3 class="guard-name">${escapeHtml(guard.name)}</h3>
                <p class="guard-title">${escapeHtml(guard.designation)}</p>

                <!-- Countdown Section -->
                <div id="countdown-container" style="margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.25); border-radius: 12px; border: 1px solid var(--glass-border);">
                    <!-- Loaded dynamically via ticker -->
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Employee ID</span>
                        <span class="info-value">${escapeHtml(guard.id)}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Department</span>
                        <span class="info-value" style="color: var(--theme-gold); font-weight: 700;">${escapeHtml(guard.department || "-")}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Designation</span>
                        <span class="info-value">${escapeHtml(guard.designation || "-")}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">${escapeHtml(guard.relationType || "Father")}'s Name</span>
                        <span class="info-value">${escapeHtml(guard.fatherName || "-")}</span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Blood Group</span>
                        <span class="info-value">${escapeHtml(guard.bloodGroup)}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Joining Date</span>
                        <span class="info-value">${escapeHtml(guard.joiningDate)}</span>
                    </div>
                </div>
            `;

            // Setup real-time ticking validity countdown
            if (window.countdownTimer) clearInterval(window.countdownTimer);

            const countdownContainer = document.getElementById('countdown-container');

            if (!isActive) {
                if (countdownContainer) {
                    let alertColor = 'var(--status-suspended)';
                    let message = 'ACCESS REVOKED / INACTIVE';
                    if (guard.status === 'Fired') {
                        message = 'ACCESS REVOKED - FIRED';
                    } else if (guard.status === 'Left') {
                        message = 'INACTIVE - LEFT SERVICE';
                        alertColor = 'var(--text-secondary)';
                    } else if (guard.status === 'Suspended') {
                        message = 'ACCESS SUSPENDED';
                    }
                    countdownContainer.innerHTML = `
                        <div style="color: ${alertColor}; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px;">
                            <i data-lucide="shield-off" style="display: inline-block; vertical-align: middle; width: 18px; height: 18px; margin-right: 4px;"></i>
                            ${message}
                        </div>
                        <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">
                            This ID card is no longer valid for duty.
                        </div>
                    `;
                }
                lucide.createIcons();
                return;
            }

            // Use cardIssueDate if set, otherwise fall back to joiningDate, then today
            const issueDateSrc = guard.cardIssueDate || guard.joiningDate || new Date().toISOString();
            const joinDate = new Date(issueDateSrc);
            const validityYears = guard.cardValidity || 3;
            const expDate = new Date(joinDate);
            expDate.setFullYear(joinDate.getFullYear() + validityYears);

            function updateCountdown() {
                const now = new Date();
                const timeDiff = expDate - now;
                const countdownContainer = document.getElementById('countdown-container');
                const statusBadge = document.querySelector('.verification-status');

                if (timeDiff <= 0) {
                    clearInterval(window.countdownTimer);
                    if (countdownContainer) {
                        countdownContainer.innerHTML = `
                            <div style="color: var(--status-suspended); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">
                                <i data-lucide="shield-alert" style="display: inline-block; vertical-align: middle; width: 16px; height: 16px; margin-right: 4px;"></i>
                                Card Expired
                            </div>
                            <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">
                                Validity ended on ${expDate.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' })}
                            </div>
                        `;
                    }
                    if (statusBadge) {
                        statusBadge.className = 'verification-status status-suspended';
                        statusBadge.innerHTML = `<i data-lucide="alert-octagon" style="width: 16px; height: 16px;"></i> CARD EXPIRED`;
                    }
                    lucide.createIcons();
                    return;
                }

                const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

                if (countdownContainer) {
                    countdownContainer.innerHTML = `
                        <div style="font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600;">Card Validity Countdown</div>
                        <div class="countdown-timer-display" style="display: flex; justify-content: center; gap: 8px; font-family: 'Inter', sans-serif;">
                            <div class="time-unit" style="background: var(--dark-accent); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--glass-border); min-width: 55px;">
                                <span style="font-size: 15px; font-weight: 700; color: var(--theme-gold); display: block; line-height: 1.1;">${days}</span>
                                <span style="font-size: 7pt; color: var(--text-muted); text-transform: uppercase; font-weight: 500;">Days</span>
                            </div>
                            <div class="time-unit" style="background: var(--dark-accent); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--glass-border); min-width: 50px;">
                                <span style="font-size: 15px; font-weight: 700; color: var(--theme-gold); display: block; line-height: 1.1;">${hours}</span>
                                <span style="font-size: 7pt; color: var(--text-muted); text-transform: uppercase; font-weight: 500;">Hrs</span>
                            </div>
                            <div class="time-unit" style="background: var(--dark-accent); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--glass-border); min-width: 50px;">
                                <span style="font-size: 15px; font-weight: 700; color: var(--theme-gold); display: block; line-height: 1.1;">${minutes}</span>
                                <span style="font-size: 7pt; color: var(--text-muted); text-transform: uppercase; font-weight: 500;">Mins</span>
                            </div>
                            <div class="time-unit" style="background: var(--dark-accent); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--glass-border); min-width: 50px;">
                                <span style="font-size: 15px; font-weight: 700; color: var(--theme-gold); display: block; line-height: 1.1;">${seconds}</span>
                                <span style="font-size: 7pt; color: var(--text-muted); text-transform: uppercase; font-weight: 500;">Secs</span>
                            </div>
                        </div>
                    `;
                }
            }

            updateCountdown();
            window.countdownTimer = setInterval(updateCountdown, 1000);
        }

        function renderError(container, heading, details) {
            container.innerHTML = `
                <div class="error-message">
                    <i data-lucide="shield-alert" class="error-icon" style="width: 48px; height: 48px;"></i>
                    <h3>${heading}</h3>
                    <p class="text-muted" style="font-size: 13px; line-height: 1.5; margin-top: 10px;">${details}</p>
                </div>
            `;
            lucide.createIcons();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
