<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Upload ID Card Photo - Valley Security Service Agency</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif; }
    body {
      background: #090d16;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }
    .container {
      width: 100%;
      max-width: 440px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(16px);
      text-align: center;
    }
    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 50px;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; }
    p.subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
    
    .emp-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    .emp-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .emp-label { color: #64748b; font-weight: 500; }
    .emp-val { color: #f1f5f9; font-weight: 700; text-align: right; }

    .photo-preview-box {
      width: 180px;
      height: 220px;
      margin: 0 auto 24px;
      border-radius: 16px;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }
    .photo-preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .photo-preview-box .upload-icon {
      font-size: 36px;
      margin-bottom: 8px;
      color: #3b82f6;
    }
    .photo-preview-box p { font-size: 12px; color: #64748b; }

    input[type="file"] { display: none; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #cbd5e1;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }

    .msg {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }
    .msg-error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; }
    .msg-success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: #4ade80; }

    .footer-note { font-size: 11px; color: #475569; margin-top: 16px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="brand-badge">Valley Security Service Agency</div>
    <h1>Upload ID Card Photo</h1>
    <p class="subtitle">Please upload a clear, front-facing passport style photo for your official security ID card.</p>

    <div id="msgBox" class="msg"></div>

    <div id="empDetails" class="emp-card" style="display:none;">
      <div class="emp-row"><span class="emp-label">Employee ID:</span><span id="dispId" class="emp-val"></span></div>
      <div class="emp-row"><span class="emp-label">Full Name:</span><span id="dispName" class="emp-val"></span></div>
      <div class="emp-row"><span class="emp-label">Department:</span><span id="dispDept" class="emp-val"></span></div>
    </div>

    <div class="photo-preview-box" onclick="document.getElementById('photoInput').click()">
      <div id="placeholderUi">
        <div class="upload-icon">📷</div>
        <p>Tap to Select / Take Photo</p>
      </div>
      <img id="previewImg" alt="Preview">
    </div>

    <input type="file" id="photoInput" accept="image/*" capture="user" onchange="handleFileSelect(event)">

    <button id="chooseBtn" class="btn btn-secondary" onclick="document.getElementById('photoInput').click()">📁 Choose Photo / Take Picture</button>
    <button id="uploadBtn" class="btn btn-primary" style="display:none;" onclick="submitPhoto()">Upload & Save Photo</button>

    <div class="footer-note">Supported formats: JPG, PNG • Max size: 10 MB</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const empId = urlParams.get('id');
    const token = urlParams.get('token');
    let selectedBase64 = null;

    function showMsg(text, isError = false) {
      const box = document.getElementById('msgBox');
      box.textContent = text;
      box.className = 'msg ' + (isError ? 'msg-error' : 'msg-success');
      box.style.display = 'block';
    }

    async function init() {
      if (!empId || !token) {
        showMsg('Invalid or missing upload link. Please request a new link.', true);
        document.getElementById('chooseBtn').style.display = 'none';
        return;
      }

      try {
        const res = await fetch(`/api/get-employee-by-token?id=${encodeURIComponent(empId)}&token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (data.success) {
          document.getElementById('dispId').textContent = data.id;
          document.getElementById('dispName').textContent = data.name;
          document.getElementById('dispDept').textContent = data.department || 'IUST Awantipora';
          document.getElementById('empDetails').style.display = 'block';

          if (data.photo) {
            document.getElementById('previewImg').src = data.photo;
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('placeholderUi').style.display = 'none';
          }
        } else {
          showMsg(data.error || 'Employee record not found.', true);
          document.getElementById('chooseBtn').style.display = 'none';
        }
      } catch (err) {
        showMsg('Network error connecting to server.', true);
      }
    }

    function handleFileSelect(evt) {
      const file = evt.target.files[0];
      if (!file) return;

      if (!file.type.startsWith('image/')) {
        showMsg('Please select a valid image file.', true);
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        selectedBase64 = e.target.result;
        document.getElementById('previewImg').src = selectedBase64;
        document.getElementById('previewImg').style.display = 'block';
        document.getElementById('placeholderUi').style.display = 'none';
        document.getElementById('uploadBtn').style.display = 'block';
        showMsg('Photo selected! Tap "Upload & Save Photo" below to submit.');
      };
      reader.readAsDataURL(file);
    }

    async function submitPhoto() {
      if (!selectedBase64) {
        showMsg('Please select a photo first.', true);
        return;
      }

      const btn = document.getElementById('uploadBtn');
      btn.disabled = true;
      btn.textContent = 'Saving photo...';

      try {
        const res = await fetch('/api/upload-photo-by-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            employeeId: empId,
            token: token,
            photoBase64: selectedBase64
          })
        });
        const data = await res.json();
        if (data.success) {
          showMsg('✅ Photo saved successfully! Your ID card is ready.');
          btn.style.display = 'none';
          document.getElementById('chooseBtn').textContent = 'Change Photo';
        } else {
          showMsg(data.error || 'Failed to save photo. Try again.', true);
          btn.disabled = false;
          btn.textContent = 'Upload & Save Photo';
        }
      } catch (err) {
        showMsg('Error uploading photo to server.', true);
        btn.disabled = false;
        btn.textContent = 'Upload & Save Photo';
      }
    }

    window.onload = init;
  </script>
</body>
</html>
